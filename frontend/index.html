<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="MapMind is a local graph-first learning workspace with explicit AI proposals, snapshots, quizzes, and rollbackable state." />
  <meta name="keywords" content="graph learning, knowledge graph, study graph, AI study workspace, proposal review, snapshots, local-first learning" />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#050505" />
  <meta name="color-scheme" content="dark" />
  <meta name="application-name" content="MapMind" />
  <meta name="apple-mobile-web-app-title" content="MapMind" />
  <meta name="format-detection" content="telephone=no" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MapMind" />
  <meta property="og:title" content="MapMind | Graph-first learning" />
  <meta property="og:description" content="Local graph-first learning workspace with proposals, snapshots, quizzes, and rollbackable state." />
  <meta property="og:image" content="/mmlogo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MapMind | Graph-first learning" />
  <meta name="twitter:description" content="Local graph-first learning workspace with proposals, snapshots, quizzes, and rollbackable state." />
  <meta name="twitter:image" content="/mmlogo.png" />
  <link rel="canonical" href="/" />
  <link rel="icon" type="image/png" href="/smalllogo.png" />
  <link rel="apple-touch-icon" href="/smalllogo.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
  <title>MapMind | Graph-first learning</title>
  <style>
    html, body, #root {
      margin: 0;
      background: #000000;
    }
    html[data-theme="light"], html[data-theme="light"] body, html[data-theme="light"] #root {
      background: #ffffff;
    }
    html[data-theme="light"] #root .app,
    html[data-theme="light"] #root .main,
    html[data-theme="light"] #root .workspaceShell,
    html[data-theme="light"] #root .workspaceMain,
    html[data-theme="light"] #root .neuroGraphShell,
    html[data-theme="light"] #root .neuroGraphSurface,
    html[data-theme="light"] #root .neuroGraphCanvas {
      background: #ffffff;
    }
    html[data-theme="dark"] #root .app,
    html[data-theme="dark"] #root .main,
    html[data-theme="dark"] #root .workspaceShell,
    html[data-theme="dark"] #root .workspaceMain,
    html[data-theme="dark"] #root .neuroGraphShell,
    html[data-theme="dark"] #root .neuroGraphSurface,
    html[data-theme="dark"] #root .neuroGraphCanvas {
      background: #000000;
    }
  </style>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("knowledge_graph_theme_mode_v1") === "light" ? "light" : "dark";
        const root = document.documentElement;
        root.dataset.theme = theme;
        root.style.backgroundColor = theme === "light" ? "#ffffff" : "#000000";
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute("content", theme === "light" ? "#ffffff" : "#050505");
        const metaScheme = document.querySelector('meta[name="color-scheme"]');
        if (metaScheme) metaScheme.setAttribute("content", theme === "light" ? "light" : "dark");
      } catch {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
