<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Clew is an AI-native workspace for structured learning with explicit proposals, snapshots, quizzes, and rollbackable state." />
  <meta name="keywords" content="graph learning, knowledge graph, study graph, AI study workspace, proposal review, snapshots, local-first learning" />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#050505" />
  <meta name="color-scheme" content="dark" />
  <meta name="application-name" content="Clew" />
  <meta name="apple-mobile-web-app-title" content="Clew" />
  <meta name="format-detection" content="telephone=no" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Clew" />
  <meta property="og:title" content="Clew Workspace" />
  <meta property="og:description" content="AI-native workspace for structured learning with explicit proposals, snapshots, quizzes, and rollbackable state." />
  <meta property="og:image" content="/clew-favicon-light-accent.png?v=2" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Clew Workspace" />
  <meta name="twitter:description" content="AI-native workspace for structured learning with explicit proposals, snapshots, quizzes, and rollbackable state." />
  <meta name="twitter:image" content="/clew-favicon-light-accent.png?v=2" />
  <link rel="canonical" href="/" />
  <link rel="icon" type="image/png" href="/clew-favicon-dark.png?v=2" />
  <link rel="apple-touch-icon" href="/clew-favicon-dark.png?v=2" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>Clew Workspace</title>
  <style>
    html, body, #root {
      margin: 0;
      background: #000000;
    }
    html[data-theme="light"], html[data-theme="light"] body, html[data-theme="light"] #root {
      background: #ffffff;
    }
    html[data-theme="light"] #root .app,
    html[data-theme="light"] #root .main,
    html[data-theme="light"] #root .workspaceShell,
    html[data-theme="light"] #root .workspaceMain,
    html[data-theme="light"] #root .neuroGraphShell,
    html[data-theme="light"] #root .neuroGraphSurface,
    html[data-theme="light"] #root .neuroGraphCanvas {
      background: #ffffff;
    }
    html[data-theme="dark"] #root .app,
    html[data-theme="dark"] #root .main,
    html[data-theme="dark"] #root .workspaceShell,
    html[data-theme="dark"] #root .workspaceMain,
    html[data-theme="dark"] #root .neuroGraphShell,
    html[data-theme="dark"] #root .neuroGraphSurface,
    html[data-theme="dark"] #root .neuroGraphCanvas {
      background: #000000;
    }
  </style>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("knowledge_graph_theme_mode_v1") === "light" ? "light" : "dark";
        const root = document.documentElement;
        root.dataset.theme = theme;
        root.style.backgroundColor = theme === "light" ? "#ffffff" : "#000000";
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute("content", theme === "light" ? "#ffffff" : "#050505");
        const metaScheme = document.querySelector('meta[name="color-scheme"]');
        if (metaScheme) metaScheme.setAttribute("content", theme === "light" ? "light" : "dark");
        const faviconHref = theme === "light" ? "/clew-favicon-light-accent.png" : "/clew-favicon-dark.png";
        const iconLink = document.querySelector('link[rel="icon"]');
        const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (iconLink) iconLink.setAttribute("href", faviconHref);
        if (appleTouchIcon) appleTouchIcon.setAttribute("href", faviconHref);
      } catch {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
