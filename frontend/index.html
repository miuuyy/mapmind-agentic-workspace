  <style>
    html, body, #root {
      margin: 0;
      background: #000000;
    }
    html[data-theme="light"], html[data-theme="light"] body, html[data-theme="light"] #root {
      background: #ffffff;
    }
    html[data-theme="light"] #root .app,
    html[data-theme="light"] #root .main,
    html[data-theme="light"] #root .workspaceShell,
    html[data-theme="light"] #root .workspaceMain,
    html[data-theme="light"] #root .neuroGraphShell,
    html[data-theme="light"] #root .neuroGraphSurface,
    html[data-theme="light"] #root .neuroGraphCanvas {
      background: #ffffff;
    }
    html[data-theme="dark"] #root .app,
    html[data-theme="dark"] #root .main,
    html[data-theme="dark"] #root .workspaceShell,
    html[data-theme="dark"] #root .workspaceMain,
    html[data-theme="dark"] #root .neuroGraphShell,
    html[data-theme="dark"] #root .neuroGraphSurface,
    html[data-theme="dark"] #root .neuroGraphCanvas {
      background: #000000;
    }

    /* Inline brand launch loader — appears the moment the browser has HTML,
       before any JS executes, and stays until React finishes mounting. */
    .clewLaunchInline {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
    }
    html[data-theme="dark"] .clewLaunchInline { background: #000000; }

    .clewLaunchInline svg {
      width: 56px;
      height: 56px;
      color: #d97757;
    }
    html[data-theme="dark"] .clewLaunchInline svg { color: rgba(255, 255, 255, 0.62); }

    .clewLaunchFillPath { fill: currentColor; stroke: none; }

    /* Mask-reveal technique: a second copy of the path lives inside an SVG
       <mask>, rendered as a very thick white stroke. Animating that stroke's
       dashoffset reveals the underlying filled path along the path's own
       trajectory — not top-down, not a box slide. Forward (100 → 0) fills
       the logo along the path; backward (0 → 100) erases along the same
       path from the tip. One cycle = one draw + one un-draw. */
    .clewLaunchMaskStroke {
      fill: none;
      stroke: white;
      stroke-width: 400;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: clewLaunchTrace 2.8s linear infinite;
    }

    @keyframes clewLaunchTrace {
      0%   { stroke-dashoffset: 100; }
      35%  { stroke-dashoffset: 0;   }
      100% { stroke-dashoffset: 100; }
    }
  </style>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("knowledge_graph_theme_mode_v1") === "light" ? "light" : "dark";
        const root = document.documentElement;
        root.dataset.theme = theme;
        root.style.backgroundColor = theme === "light" ? "#ffffff" : "#000000";
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute("content", theme === "light" ? "#ffffff" : "#050505");
        const metaScheme = document.querySelector('meta[name="color-scheme"]');
        if (metaScheme) metaScheme.setAttribute("content", theme === "light" ? "light" : "dark");
        const faviconHref = theme === "light" ? "/clew-favicon-light-accent.png" : "/clew-favicon-dark.png";
        const iconLink = document.querySelector('link[rel="icon"]');
        const appleTouchIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (iconLink) iconLink.setAttribute("href", faviconHref);
        if (appleTouchIcon) appleTouchIcon.setAttribute("href", faviconHref);
      } catch {}
    })();
  </script>
